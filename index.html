<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#000000" />
<title>Office Log</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#000000; --bg1:#0a0a0b; --bg2:#111113; --panel:#141416; --panel2:#1b1b1e;
  --line:#262629; --line2:#323237; --ink:#ffffff; --ink2:#e6e6ea; --muted:#8a8a93; --muted2:#5f5f68;
  --accent:#34d399; --accent2:#22c55e;
  --present:#34d399; --holiday:#60a5fa; --leave:#fbbf24; --offday:#94a3b8;
  --paid:#22c55e; --unpaid:#ef4444;
  --present-s:rgba(52,211,153,.15); --holiday-s:rgba(96,165,250,.15);
  --leave-s:rgba(251,191,36,.15); --offday-s:rgba(148,163,184,.15);
  --r:16px; --r-sm:11px;
  --shadow:0 16px 44px -18px rgba(0,0,0,.85);
  --font:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
  --mono:'Space Mono','JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; min-height:100vh;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
input,select,textarea{font-family:inherit;color:var(--ink)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
svg{width:1em;height:1em;display:block}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:22px;z-index:100;
  background:radial-gradient(1000px 500px at 50% -10%, rgba(52,211,153,.07), transparent 60%), var(--bg)}
.login-card{width:100%;max-width:370px;background:var(--panel);border:1px solid var(--line);border-radius:22px;
  padding:36px 28px;box-shadow:var(--shadow);animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brand .mk{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#04130b;font-size:24px}
.brand .mk svg{width:24px;height:24px}
.brand h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
.brand p{font-size:12px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{width:100%;padding:13px 14px;border-radius:11px;background:var(--bg1);border:1px solid var(--line);
  font-size:15px;outline:none;transition:.18s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,211,153,.13)}
.btn{padding:13px 16px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .14s,box-shadow .2s,background .15s,border-color .15s}
.btn-primary{width:100%;background:linear-gradient(140deg,var(--accent),var(--accent2));color:#04130b;margin-top:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 22px -8px rgba(52,211,153,.55)}
.btn-ghost{background:var(--panel2);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--line2)}
.err{color:var(--unpaid);font-size:13px;margin-top:11px;min-height:17px;text-align:center}
.cfg-note{font-size:11px;color:var(--muted2);margin-top:18px;text-align:center;line-height:1.5}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;flex-direction:column}
.appbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 18px;background:rgba(10,10,11,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.appbar .who{display:flex;align-items:center;gap:11px;min-width:0}
.appbar .mk{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#04130b;flex-shrink:0}
.appbar .mk svg{width:18px;height:18px}
.appbar h2{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appbar .sync{font-size:10.5px;color:var(--muted)}
.appbar .actions{display:flex;gap:7px;flex-shrink:0}
.iconbtn{width:36px;height:36px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
  display:grid;place-items:center;font-size:17px;color:var(--ink2);transition:.15s}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}

/* tabs */
.tabbar{position:sticky;top:61px;z-index:35;display:flex;gap:4px;overflow-x:auto;padding:10px 14px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;
  color:var(--muted);white-space:nowrap;border:1px solid transparent;transition:.15s}
.tab svg{width:16px;height:16px}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--ink);background:var(--panel);border-color:var(--line2)}
.tab.active svg{color:var(--accent)}

main{flex:1;max-width:1120px;width:100%;margin:0 auto;padding:20px 16px 90px}
.view{display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.card+.card{margin-top:16px}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3 svg{width:15px;height:15px;color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:840px){.grid2{grid-template-columns:1fr 1fr}}
.grid3{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:720px){.grid3{grid-template-columns:repeat(3,1fr)}}

/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:680px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:16px}
.stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.stat .lbl svg{width:13px;height:13px}
.stat .n{font-family:var(--mono);font-size:25px;font-weight:700;margin-top:8px;letter-spacing:-1px}
.stat .sub{font-size:11px;color:var(--muted2);margin-top:3px}
.stat.accent .n{color:var(--accent)} .stat.green .n{color:var(--paid)} .stat.red .n{color:var(--unpaid)}
.stat.blue .n{color:var(--holiday)} .stat.amber .n{color:var(--leave)}

/* chart wrap */
.chart-wrap{position:relative;height:240px}
.chart-wrap.sm{height:200px}

/* buttons row */
.btnrow{display:flex;gap:9px;flex-wrap:wrap}
.btnrow .btn{flex:0 0 auto}
.btn-sm{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;background:var(--panel2);border:1px solid var(--line)}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.go{background:linear-gradient(140deg,var(--accent),var(--accent2));color:#04130b;border:none}
.btn-sm.go:hover{color:#04130b}
.btn-sm svg{width:15px;height:15px;display:inline-block;vertical-align:-2px;margin-right:5px}

/* inputs */
.frow{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
.fcol{flex:1;min-width:130px}
.fcol label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fcol input,.fcol select,.fcol textarea{width:100%;padding:11px 12px;border-radius:10px;background:var(--bg1);
  border:1px solid var(--line);font-size:14px;outline:none;transition:.15s}
.fcol input:focus,.fcol select:focus,.fcol textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,211,153,.12)}
input[type=date],input[type=time]{color-scheme:dark}

/* table */
.tablewrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
thead th{text-align:left;padding:11px 12px;background:var(--bg1);color:var(--muted);font-weight:600;
  font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg1)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill i{width:7px;height:7px;border-radius:50%}
.rowact{display:flex;gap:6px}
.rowact button{width:30px;height:30px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);
  display:grid;place-items:center;font-size:14px;transition:.14s}
.rowact button:hover{border-color:var(--accent);color:var(--accent)}
.rowact button.del:hover{border-color:var(--unpaid);color:var(--unpaid)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}

/* calendars */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{width:38px;height:38px;border-radius:10px;background:var(--bg1);border:1px solid var(--line);display:grid;place-items:center;font-size:18px;transition:.14s}
.cal-nav:hover{border-color:var(--accent);color:var(--accent)}
.cal-nav:disabled{opacity:.3;cursor:not-allowed}
.cal-title{text-align:center}
.cal-title .m{font-size:20px;font-weight:700;letter-spacing:-.4px}
.cal-title .s{font-size:11.5px;color:var(--muted);margin-top:2px}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.dow span{text-align:center;font-size:11px;color:var(--muted);font-weight:600}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{aspect-ratio:1;border-radius:11px;background:var(--bg1);border:1px solid var(--line);position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.13s;overflow:hidden}
.day .bn{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1}
.day .an{font-size:9px;color:var(--muted);margin-top:2px}
.day.empty{background:transparent;border:none;cursor:default}
.day:not(.empty):hover{border-color:var(--accent);transform:translateY(-1px)}
.day.today{outline:2px solid var(--accent);outline-offset:-2px}
.day.sel{outline:2px solid var(--ink);outline-offset:-2px}
/* status fills */
.day.f-present{background:var(--present-s);border-color:rgba(52,211,153,.4)} .day.f-present .bn{color:var(--present)}
.day.f-holiday{background:var(--holiday-s);border-color:rgba(96,165,250,.4)} .day.f-holiday .bn{color:var(--holiday)}
.day.f-leave{background:var(--leave-s);border-color:rgba(251,191,36,.4)} .day.f-leave .bn{color:var(--leave)}
.day.f-offday{background:var(--offday-s);border-color:rgba(148,163,184,.4)} .day.f-offday .bn{color:var(--offday)}
/* pay fills (pay calendar) */
.day.p-paid{background:rgba(34,197,94,.16);border-color:rgba(34,197,94,.45)} .day.p-paid .bn{color:var(--paid)}
.day.p-unpaid{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.45)} .day.p-unpaid .bn{color:var(--unpaid)}
/* pay dot (status calendar) */
.day .paydot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%}
.day .hol{position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--holiday)}
.legend{display:flex;flex-wrap:wrap;gap:13px;margin-top:16px;font-size:11.5px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block}
.legend i.dot{border-radius:50%;width:9px;height:9px}

/* detail panel */
.detail{background:var(--bg1);border:1px solid var(--line);border-radius:13px;padding:16px;margin-top:16px}
.detail .dh{font-size:16px;font-weight:700}
.detail .dsub{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:12px}
.detail .drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.detail .drow:last-child{border-bottom:none}
.detail .drow .k{color:var(--muted)}
.detail .drow .v{font-weight:600}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:none;
  align-items:center;justify-content:center;padding:18px;z-index:120}
.modal-bg.show{display:flex}
.modal{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line2);border-radius:20px;
  padding:22px;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
.modal h4{font-size:18px;font-weight:700;margin-bottom:3px}
.modal .msub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.seg.four{grid-template-columns:1fr 1fr}
.segbtn{padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--bg1);font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:.14s}
.segbtn i{width:9px;height:9px;border-radius:50%}
.segbtn.on{border-width:1.5px}
.segbtn:hover{border-color:var(--line2)}
.modal .mfoot{display:flex;gap:9px;margin-top:18px}
.modal .mfoot .btn{flex:1}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(90px);background:var(--panel2);
  border:1px solid var(--accent);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow);opacity:0;transition:.32s cubic-bezier(.2,.8,.2,1);z-index:130;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* holiday list */
.hol-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.hol-item:last-child{border-bottom:none}
.hol-date{flex-shrink:0;width:62px;text-align:center;background:var(--bg1);border:1px solid var(--line);border-radius:10px;padding:8px 4px}
.hol-date .d{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--holiday)}
.hol-date .mo{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.hol-info .nm{font-size:14px;font-weight:600}
.hol-info .ad{font-size:11.5px;color:var(--muted);margin-top:2px}
.hol-past{opacity:.45}

/* salary blocks */
.salary-hero{background:linear-gradient(140deg,rgba(52,211,153,.12),rgba(34,197,94,.05));
  border:1px solid rgba(52,211,153,.3);border-radius:16px;padding:20px;margin-bottom:16px}
.salary-hero .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.salary-hero .amt{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--accent);letter-spacing:-1.5px;margin-top:6px}
.salary-hero .break{font-size:12.5px;color:var(--muted2);margin-top:6px}
.mini-stat{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.mini-stat:last-child{border-bottom:none}
.mini-stat .v{font-family:var(--mono);font-weight:700}

/* settings */
.set-group{margin-bottom:8px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-row .info .t{font-size:14px;font-weight:600}
.set-row .info .d{font-size:11.5px;color:var(--muted);margin-top:2px}
.set-row .ctl{flex-shrink:0}
.set-row .ctl input{width:110px;padding:9px 11px;border-radius:9px;background:var(--bg1);border:1px solid var(--line);font-size:14px;outline:none;text-align:right}
.set-row .ctl input:focus{border-color:var(--accent)}
.switch{position:relative;width:46px;height:26px;border-radius:20px;background:var(--line2);transition:.2s;cursor:pointer}
.switch.on{background:var(--accent)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.switch.on::after{transform:translateX(20px)}
.profile-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.avatar{width:58px;height:58px;border-radius:16px;background:linear-gradient(140deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#04130b;font-size:24px;font-weight:700}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:700;margin:22px 0 10px}

/* v3 additions: month groups + range breakdown */
.month-group{margin-bottom:18px}
.month-group:last-child{margin-bottom:0}
.month-group-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.mg-title{font-size:14px;font-weight:700}
.mg-meta{font-size:11.5px;color:var(--muted)}
.range-break{margin-top:14px;background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:14px}
.rb-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.rb-row:last-of-type{border-bottom:none}
.rb-k{flex-shrink:0;width:90px;font-weight:700}
.rb-v{display:flex;flex-wrap:wrap;gap:5px}
.daychip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-family:var(--mono);font-size:11px}
.rb-foot{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}


/* v4: calendar system toggle */
.systoggle{display:inline-flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px}
.sysbtn{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);transition:.15s}
.sysbtn.on{background:linear-gradient(140deg,var(--accent),var(--accent2));color:#04130b}
.sysbtn:not(.on):hover{color:var(--ink2)}

</style>
</head>
<body>
<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="mk" id="brandIcon"></div>
      <div><h1>Office Log</h1><p>Attendance · Pay · Salary</p></div>
    </div>
    <div class="field"><label>Username</label><input id="u" type="text" autocomplete="username" placeholder="username" /></div>
    <div class="field"><label>Password</label><input id="p" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
    <button class="btn btn-primary" id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
    <p class="cfg-note" id="cfgNote"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="appbar">
    <div class="who">
      <div class="mk" id="barIcon"></div>
      <div style="min-width:0">
        <h2 id="barName">Rohan Adhikari</h2>
        <div class="sync" id="syncState">—</div>
      </div>
    </div>
    <div class="actions">
      <button class="iconbtn" id="quickLogBtn" title="Log a day"></button>
      <button class="iconbtn" id="logoutBtn" title="Sign out"></button>
    </div>
  </div>

  <nav class="tabbar" id="tabbar"></nav>

  <main>
    <section class="view" data-view="dashboard" id="v-dashboard"></section>
    <section class="view" data-view="log" id="v-log"></section>
    <section class="view" data-view="statuscal" id="v-statuscal"></section>
    <section class="view" data-view="paycal" id="v-paycal"></section>
    <section class="view" data-view="analytics" id="v-analytics"></section>
    <section class="view" data-view="holidays" id="v-holidays"></section>
    <section class="view" data-view="salary" id="v-salary"></section>
    <section class="view" data-view="settings" id="v-settings"></section>
  </main>
</div>

<!-- LOG/EDIT MODAL -->
<div class="modal-bg" id="logModal">
  <div class="modal">
    <h4 id="lmTitle">Log a day</h4>
    <div class="msub" id="lmSub"></div>
    <div class="fcol" style="margin-bottom:13px">

const BS_EPOCH = new Date(1943, 3, 14);
const DAY_MS = 86400000;
function bsToDayCount(y,m,d){ let n=0; for(let yr=2000;yr<y;yr++){for(let mo=0;mo<12;mo++)n+=BS_DATA[yr][mo];} for(let mo=0;mo<m-1;mo++)n+=BS_DATA[y][mo]; n+=d-1; return n; }
function bsToAd(y,m,d){ return new Date(BS_EPOCH.getTime()+bsToDayCount(y,m,d)*DAY_MS); }
function adToBs(date){ const d0=new Date(date.getFullYear(),date.getMonth(),date.getDate()); let diff=Math.round((d0-BS_EPOCH)/DAY_MS); let y=2000; while(BS_DATA[y]){ const yd=BS_DATA[y].reduce((a,b)=>a+b,0); if(diff<yd)break; diff-=yd;y++; } let m=0; while(diff>=BS_DATA[y][m]){ diff-=BS_DATA[y][m]; m++; } return {y,m:m+1,d:diff+1}; }
function bsMonthDays(y,m){ return BS_DATA[y]?BS_DATA[y][m-1]:30; }
function npNum(n){ return String(n).split('').map(c=>NP_DIGITS[+c]||c).join(''); }
function isoKey(date){ return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0'); }

function durationMin(a,b){ if(!a||!b)return 0; const[ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); let m=(bh*60+bm)-(ah*60+am); if(m<0)m+=1440; return m; }

/* ===== NEW: AD-month helpers (added for v3) ===== */
const EN_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// AD month key 'YYYY-MM' from an ISO day key
function adMonthKey(isoDay){ return isoDay.slice(0,7); }
function adMonthLabel(mk){ const [y,m]=mk.split('-'); return EN_MONTHS[+m-1]+' '+y; }

// total calendar days in an AD month
function adDaysInMonth(y,m){ return new Date(y, m, 0).getDate(); } // m is 1-based

// records grouped by AD month -> { 'YYYY-MM': [recs...] }, sorted keys desc (newest first)
function recordsByAdMonth(){
  const groups={};
  Object.keys(DB).sort().forEach(k=>{
    const mk=adMonthKey(k);
    (groups[mk]=groups[mk]||[]).push({key:k, ...DB[k]});
  });
  return groups;
}
// all records in a given AD month (y 4-digit, m 1-based)
function recordsInAdMonth(y,m){
  const mk=y+'-'+String(m).padStart(2,'0');
  return Object.keys(DB).filter(k=>adMonthKey(k)===mk).sort().map(k=>({key:k, ...DB[k]}));
}
// salary for an AD month
function salaryFromRecords(recs){
  const base=PROFILE.salary.base, per=PROFILE.salary.perPresent;
  // a day is "payable" (earns per-day rate) if it is Present OR marked Unpaid; count each day once
  const payable=recs.filter(r=> r.status==='present' || r.pay==='unpaid').length;
  const present=recs.filter(r=>r.status==='present').length;
  const unpaid=recs.filter(r=>r.pay==='unpaid').length;
  return { payable, present, unpaid, base, per, total: base+payable*per };
}
function salaryForAdMonth(y,m){ return salaryFromRecords(recordsInAdMonth(y,m)); }
// all unpaid records across all months, newest first
function allUnpaid(){
  return Object.keys(DB).filter(k=>DB[k].pay==='unpaid').sort().reverse().map(k=>({key:k, ...DB[k]}));
}
function allPaid(){
  return Object.keys(DB).filter(k=>DB[k].pay==='paid').sort().reverse().map(k=>({key:k, ...DB[k]}));
}

/* ============================================================
   UNIFIED CALENDAR SYSTEM LAYER (AD or BS)
   CAL.sys is 'ad' or 'bs'. Persisted per-view in localStorage.
   A "month" is identified by {y,m}. These helpers translate that
   into the set of AD date-keys belonging to that month in either
   system, so every renderer works uniformly.
   ============================================================ */
const CAL = {
  // remembered system per view
  status: localStorage.getItem('ol_sys_status') || 'bs',
  pay:    localStorage.getItem('ol_sys_pay')    || 'bs',
  log:    localStorage.getItem('ol_sys_log')    || 'bs',
  ana:    localStorage.getItem('ol_sys_ana')    || 'bs',
};
function setSys(view,sys){ CAL[view]=sys; localStorage.setItem('ol_sys_'+view,sys); }

// month label for a system
function monthLabel(sys,y,m){ return sys==='bs' ? `${NP_MONTHS[m-1]} ${y}` : `${EN_MONTHS[m-1]} ${y}`; }
// number of days in a (system) month
function sysMonthDays(sys,y,m){ return sys==='bs' ? bsMonthDays(y,m) : adDaysInMonth(y,m); }
// AD Date object of day 1 of a (system) month
function sysFirstAD(sys,y,m){ return sys==='bs' ? bsToAd(y,m,1) : new Date(y,m-1,1); }
// AD date for day d of a (system) month
function sysDayAD(sys,y,m,d){ return sys==='bs' ? bsToAd(y,m,d) : new Date(y,m-1,d); }
// given an AD date, the {y,m,d} in the system
function sysFromAD(sys,ad){ if(sys==='bs') return adToBs(ad); return {y:ad.getFullYear(), m:ad.getMonth()+1, d:ad.getDate()}; }
// today in the system
function sysToday(sys){ return sysFromAD(sys, today); }
// step a month within system limits (no hard lower bound for AD; BS limited by table)
function stepMonth(sys,y,m,dir){
  let nm=m+dir, ny=y;
  if(nm>12){nm=1;ny++;} if(nm<1){nm=12;ny--;}
  if(sys==='bs' && !BS_DATA[ny]) return null;
  return {y:ny,m:nm};
}
// records in a (system) month, sorted by date
function recordsInMonth(sys,y,m){
  const days=sysMonthDays(sys,y,m); const out=[];
  for(let d=1;d<=days;d++){ const k=isoKey(sysDayAD(sys,y,m,d)); if(DB[k]) out.push({key:k, sysd:{y,m,d}, ...DB[k]}); }
  return out;
}
// group ALL records by (system) month -> { 'sys-y-m': {y,m,recs:[]} }, newest first
function recordsBySysMonth(sys){
  const groups={};
  Object.keys(DB).sort().forEach(k=>{
    const ad=new Date(k); const s=sysFromAD(sys,ad);
    const mk=s.y+'-'+String(s.m).padStart(2,'0');
    (groups[mk]=groups[mk]||{y:s.y,m:s.m,recs:[]}).recs.push({key:k, sysd:s, ...DB[k]});
  });
  return groups;
}
function salaryForMonth(sys,y,m){ return salaryFromRecords(recordsInMonth(sys,y,m)); }

/* ---- shared: month-wise log grouped in a given system ---- */
function monthLogBlock(sys){
  const groups=recordsBySysMonth(sys);
  const keys=Object.keys(groups).sort().reverse();
  if(keys.length===0) return `<div class="empty-state">No logs yet.</div>`;
  let html='';
  keys.forEach(mk=>{
    const g=groups[mk]; const recs=g.recs.sort((a,b)=>a.key<b.key?-1:1);
    const present=recs.filter(r=>r.status==='present').length;
    const paid=recs.filter(r=>r.pay==='paid').length;
    const unpaid=recs.filter(r=>r.pay==='unpaid').length;
    let rows='';
    recs.forEach(r=>{
      const ad=new Date(r.key); const b=adToBs(ad);
      rows+=`<tr>
        <td class="mono">${ad.getDate()} ${EN_MONTHS[ad.getMonth()].slice(0,3)}</td>
        <td class="mono">${b.d} ${NP_MONTHS[b.m-1].slice(0,3)}</td>
        <td>${dayName(ad).slice(0,3)}</td>
        <td>${statusPill(r.status)}</td>
        <td>${payPill(r.pay)}</td>
        <td><div class="rowact"><button title="Edit" onclick="openLog('${r.key}')">${icon('edit')}</button></div></td>
      </tr>`;
    });
    html+=`<div class="month-group">
      <div class="month-group-head">
        <span class="mg-title">${monthLabel(sys,g.y,g.m)}</span>
        <span class="mg-meta">${recs.length} logged · ${present} present · <span style="color:var(--paid)">${paid} paid</span> · <span style="color:var(--unpaid)">${unpaid} unpaid</span></span>
      </div>
      <div class="tablewrap"><table>
        <thead><tr><th>AD</th><th>BS</th><th>Day</th><th>Status</th><th>Pay</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  });
  return html;
}

function renderLog(){

  if(logFilter.sys!==sys){ const t=sysToday(sys); logFilter.sys=sys; logFilter.y=t.y; logFilter.m=t.m; }
  // years available = from data (converted to this system) + this year
  const t=sysToday(sys);
  let years=new Set([t.y]);
  Object.keys(DB).forEach(k=>{ const s=sysFromAD(sys,new Date(k)); years.add(s.y); });
  years=[...years].sort();
  if(!years.includes(logFilter.y)) logFilter.y=t.y;
  const monthsArr = sys==='bs'?NP_MONTHS:EN_MONTHS;

  let recs=recordsInMonth(sys,logFilter.y,logFilter.m);

        <thead><tr>

function calSub(sys,y,m){

async function markRange(val){

  const keys=[];
  for(let d=new Date(a); d<=b; d.setDate(d.getDate()+1)){
    const key=isoKey(d);
    if(val==='clear'){ if(DB[key]){ DB[key].pay=null; setRec(key,{}); } }

    keys.push(key);
  }
  await upsertMany(keys);
  drawPayGrid();

    const u=arr.filter(r=>r.pay==='unpaid').length;
    totalPaidAll+=p; totalUnpaidAll+=u;
    monthRows+=`<tr><td>${adMonthLabel(mk)}</td><td class="mono" style="color:var(--paid)">${p}</td><td class="mono" style="color:var(--unpaid)">${u}</td></tr>`;
  });

  const el=document.getElementById('v-salary');
  el.innerHTML=`
    <div class="salary-hero">
      <div class="lbl">Salary this month · ${EN_MONTHS[m-1]} ${y}</div>
      <div class="amt mono">${cur} ${sal.total.toLocaleString()}</div>
      <div class="break">${cur} ${sal.base.toLocaleString()} base + ${sal.present} present × ${cur} ${sal.per}</div>
    </div>

    <div class="section-title">Current month breakdown</div>
    <div class="grid2">
      <div class="card">
        <h3>${icon('salary')} ${EN_MONTHS[m-1]} breakdown</h3>
        <div class="mini-stat"><span>Base salary</span><span class="v mono">${cur} ${sal.base.toLocaleString()}</span></div>
        <div class="mini-stat"><span>Present days</span><span class="v mono">${sal.present}</span></div>
        <div class="mini-stat"><span>Per-day rate</span><span class="v mono">${cur} ${sal.per}</span></div>
        <div class="mini-stat"><span>Present earnings</span><span class="v mono">${cur} ${(sal.present*sal.per).toLocaleString()}</span></div>
        <div class="mini-stat" style="border-top:2px solid var(--line2);margin-top:4px;padding-top:11px">
          <span style="font-weight:700">Total</span><span class="v mono" style="color:var(--accent);font-size:16px">${cur} ${sal.total.toLocaleString()}</span></div>
      </div>
      <div class="card">
        <h3>${icon('calPay')} ${EN_MONTHS[m-1]} pay counts</h3>
        <div class="mini-stat"><span><span class="pill" style="background:var(--paid)22;color:var(--paid)"><i style="background:var(--paid)"></i>Paid days</span></span><span class="v mono">${paidDays.length}</span></div>
        <div class="mini-stat"><span><span class="pill" style="background:var(--unpaid)22;color:var(--unpaid)"><i style="background:var(--unpaid)"></i>Unpaid days</span></span><span class="v mono">${unpaidDays.length}</span></div>
        <div class="mini-stat"><span>Paid &amp; present</span><span class="v mono">${paidPresent}</span></div>
      </div>
    </div>

    <div class="section-title">Pay-day counts — all months</div>
    <div class="card">
      <div class="tablewrap"><table>
        <thead><tr><th>Month (AD)</th><th>Paid</th><th>Unpaid</th></tr></thead>
        <tbody>${monthRows||'<tr><td colspan=3><div class="empty-state">No data yet.</div></td></tr>'}</tbody>
        <tfoot><tr style="border-top:2px solid var(--line2)"><td style="font-weight:700;padding:11px 12px">Total</td><td class="mono" style="color:var(--paid);font-weight:700;padding:11px 12px">${totalPaidAll}</td><td class="mono" style="color:var(--unpaid);font-weight:700;padding:11px 12px">${totalUnpaidAll}</td></tr></tfoot>
      </table></div>
    </div>

    <div class="section-title">All unpaid days (every month)</div>
    <div class="card" id="sal-unpaid"></div>
  `;
  document.getElementById('sal-unpaid').innerHTML=unpaidListByMonth();
}
/* ===== LOG / EDIT MODAL ===== */
function openLog(key){
  editKey=key;
  const ad=new Date(key); const b=adToBs(ad); const r=DB[key]||{};
  document.getElementById('lmTitle').textContent=DB[key]?'Edit day':'Log a day';
  document.getElementById('lmSub').textContent=`${fmtAD(ad)} · ${dayName(ad)} · ${bsStr(b)} BS`;
  document.getElementById('lmDate').value=key;
  lmStatusVal=r.status||null; lmPayVal=r.pay||null;
  const sc=document.getElementById('lmStatus'); sc.innerHTML='';
  Object.keys(STATUS_META).forEach(s=>{ const m=STATUS_META[s]; const btn=document.createElement('button'); btn.className='segbtn'+(lmStatusVal===s?' on':''); btn.dataset.s=s; btn.style.cssText=lmStatusVal===s?`border-color:${m.color};background:${m.soft};color:${m.color}`:''; btn.innerHTML=`<i style="background:${m.color}"></i>${m.label}`; btn.onclick=()=>{ lmStatusVal=(lmStatusVal===s?null:s); refreshSegs(); }; sc.appendChild(btn); });
  const pc=document.getElementById('lmPay'); pc.innerHTML='';
  Object.keys(PAY_META).forEach(p=>{ const m=PAY_META[p]; const btn=document.createElement('button'); btn.className='segbtn'+(lmPayVal===p?' on':''); btn.dataset.p=p; btn.style.cssText=lmPayVal===p?`border-color:${m.color};background:${m.color}22;color:${m.color}`:''; btn.innerHTML=`<i style="background:${m.color}"></i>${m.label}`; btn.onclick=()=>{ lmPayVal=(lmPayVal===p?null:p); refreshSegs(); }; pc.appendChild(btn); });
  document.getElementById('lmDesc').value=r.desc||'';
  document.getElementById('logModal').classList.add('show');
}
function refreshSegs(){
  document.querySelectorAll('#lmStatus .segbtn').forEach(btn=>{ const s=btn.dataset.s,m=STATUS_META[s],on=lmStatusVal===s; btn.className='segbtn'+(on?' on':''); btn.style.cssText=on?`border-color:${m.color};background:${m.soft};color:${m.color}`:''; });
  document.querySelectorAll('#lmPay .segbtn').forEach(btn=>{ const p=btn.dataset.p,m=PAY_META[p],on=lmPayVal===p; btn.className='segbtn'+(on?' on':''); btn.style.cssText=on?`border-color:${m.color};background:${m.color}22;color:${m.color}`:''; });
}
function closeLog(){ document.getElementById('logModal').classList.remove('show'); }
async function saveLog(){
  const newKey=document.getElementById('lmDate').value;
  if(!newKey){ toast('Pick a date'); return; }
  if(newKey!==editKey && DB[editKey]){ delete DB[editKey]; }
  const desc=document.getElementById('lmDesc').value.trim();
  setRec(newKey,{status:lmStatusVal,pay:lmPayVal,inT:null,outT:null,desc:desc||null});
  if(newKey!==editKey) await upsertDay(editKey);
  await upsertDay(newKey);
  closeLog(); refreshCurrent(); toast('Saved');
}

/* ===== EXPORT / IMPORT ===== */
function exportCSV(){
  const keys=Object.keys(DB).sort();
  let csv='AD Date,BS Date,Day,Status,Pay,In,Out,Hours,Description\n';
  keys.forEach(k=>{ const r=DB[k]; const ad=new Date(k); const b=adToBs(ad); const desc=(r.desc||'').replace(/"/g,'""'); csv+=`${k},${b.y}-${String(b.m).padStart(2,'0')}-${String(b.d).padStart(2,'0')},${dayName(ad)},${r.status||''},${r.pay||''},${r.inT||''},${r.outT||''},${hoursStr(r.inT,r.outT)},"${desc}"\n`; });
  download('office-log-'+todayKey+'.csv',csv,'text/csv'); toast('CSV exported');
}
function exportJSON(){ download('office-log-backup-'+todayKey+'.json',JSON.stringify({records:DB,profile:PROFILE},null,2),'application/json'); toast('Backup downloaded'); }
function importJSON(e){ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=async()=>{ try{ const obj=JSON.parse(rd.result); if(obj.records){ DB=obj.records; cacheLocal(); if(sb)await upsertMany(Object.keys(DB)); } if(obj.profile){ PROFILE=obj.profile; saveProfile(); } toast('Backup restored'); refreshCurrent(); }catch(err){ toast('Invalid backup file'); } }; rd.readAsText(f); }
function download(name,content,type){ const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }

/* ===== SETTINGS ===== */
function renderSettings(){
  const el=document.getElementById('v-settings');
  const s=PROFILE.salary, r=PROFILE.reminders;
  const initials=(PROFILE.name||'R').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  el.innerHTML=`
    <div class="card">
      <h3>${icon('user')} Profile</h3>
      <div class="profile-head"><div class="avatar">${initials}</div>
        <div><div style="font-size:17px;font-weight:700">${escapeHtml(PROFILE.name)}</div><div style="font-size:12.5px;color:var(--muted)">${escapeHtml(PROFILE.role||'')}</div></div></div>
      <div class="frow" style="margin-top:8px">
        <div class="fcol"><label>Name</label><input id="setName" value="${escapeHtml(PROFILE.name)}"></div>
        <div class="fcol"><label>Role</label><input id="setRole" value="${escapeHtml(PROFILE.role||'')}"></div>
      </div>
    </div>
    <div class="card">
      <h3>${icon('salary')} Salary configuration</h3>
      <div class="set-row"><div class="info"><div class="t">Base salary (monthly)</div><div class="d">Fixed amount every month</div></div><div class="ctl"><input type="number" id="setBase" value="${s.base}"></div></div>
      <div class="set-row"><div class="info"><div class="t">Per present-day rate</div><div class="d">Added per Present day</div></div><div class="ctl"><input type="number" id="setPer" value="${s.perPresent}"></div></div>
      <div class="set-row"><div class="info"><div class="t">Currency symbol</div><div class="d">Shown before amounts</div></div><div class="ctl"><input id="setCur" value="${s.currency}"></div></div>
    </div>
    <div class="card">
      <h3>${icon('bell')} Reminders</h3>
      <div class="set-row"><div class="info"><div class="t">Enable notifications</div><div class="d">Fire while app is open or installed</div></div><div class="ctl"><div class="switch ${r.enabled?'on':''}" id="setNotif"></div></div></div>
      <div class="set-row"><div class="info"><div class="t">Log-in reminder</div><div class="d">Daily prompt to log in</div></div><div class="ctl"><input type="time" id="setInTime" value="${r.in}"></div></div>
      <div class="set-row"><div class="info"><div class="t">Log-out reminder</div><div class="d">Daily prompt to log out</div></div><div class="ctl"><input type="time" id="setOutTime" value="${r.out}"></div></div>
    </div>
    <div class="card">
      <h3>${icon('download')} Data</h3>
      <div class="btnrow">
        <button class="btn btn-sm" onclick="exportCSV()">${icon('download')} Export CSV</button>
        <button class="btn btn-sm" onclick="exportJSON()">${icon('download')} Backup (JSON)</button>
        <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">${icon('upload')} Restore backup</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
    <div class="card"><button class="btn btn-primary" id="setSaveBtn">${icon('check')} Save settings</button></div>
  `;
  document.getElementById('setNotif').onclick=function(){ this.classList.toggle('on'); };
  document.getElementById('setSaveBtn').onclick=saveSettings;
}
async function saveSettings(){
  PROFILE.name=document.getElementById('setName').value.trim()||'User';
  PROFILE.role=document.getElementById('setRole').value.trim();
  PROFILE.salary.base=+document.getElementById('setBase').value||0;
  PROFILE.salary.perPresent=+document.getElementById('setPer').value||0;
  PROFILE.salary.currency=document.getElementById('setCur').value.trim()||'Rs';
  PROFILE.reminders.in=document.getElementById('setInTime').value;
  PROFILE.reminders.out=document.getElementById('setOutTime').value;
  const wantNotif=document.getElementById('setNotif').classList.contains('on');
  PROFILE.reminders.enabled=wantNotif;
  saveProfile();
  document.getElementById('barName').textContent=PROFILE.name;
  if(wantNotif && 'Notification' in window && Notification.permission!=='granted'){ const perm=await Notification.requestPermission(); if(perm!=='granted'){ PROFILE.reminders.enabled=false; saveProfile(); toast('Allow notifications in your browser'); } }
  setupNotifications(); toast('Settings saved');
}

/* ===== NOTIFICATIONS ===== */
let notifTimers=[];
function setupNotifications(){ notifTimers.forEach(t=>clearTimeout(t)); notifTimers=[]; if(!PROFILE.reminders.enabled)return; if(!('Notification' in window)||Notification.permission!=='granted')return; scheduleDaily(PROFILE.reminders.in,'Time to log in','Open Office Log and record your log-in.'); scheduleDaily(PROFILE.reminders.out,'Time to log out','Open Office Log and record your log-out.'); }
function scheduleDaily(hm,title,body){ if(!hm)return; const [h,m]=hm.split(':').map(Number); const now=new Date(); const t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0); if(t<=now)t.setDate(t.getDate()+1); const id=setTimeout(()=>{ fireNotification(title,body); scheduleDaily(hm,title,body); },t-now); notifTimers.push(id); }
function fireNotification(title,body){ try{ if(navigator.serviceWorker&&navigator.serviceWorker.ready){ navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,{body,icon:'icon-192.png',badge:'icon-192.png',tag:'officelog'})); } else { new Notification(title,{body,icon:'icon-192.png'}); } }catch(e){} }

/* ===== SW + helpers ===== */
function registerSW(){ if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{}); }
function refreshCurrent(){ const R={dashboard:renderDashboard,log:renderLog,statuscal:renderStatusCal,paycal:renderPayCal,analytics:renderAnalytics,holidays:renderHolidays,salary:renderSalary,settings:renderSettings}; R[currentTab](); }
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }


</script>
